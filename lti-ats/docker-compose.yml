version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: lti-ats-db
    environment:
      POSTGRES_DB: lti_ats
      POSTGRES_USER: lti_user
      POSTGRES_PASSWORD: lti_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lti_user -d lti_ats"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
